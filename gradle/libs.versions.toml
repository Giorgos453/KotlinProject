[versions]
agp = "9.0.0"
coreKtx = "1.17.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.12.3"
kotlin = "2.0.21"
composeBom = "2024.09.00"
navigationCompose = "2.8.9"
playServicesLocation = "21.3.0"
coroutinesPlayServices = "1.10.2"
maplibre = "11.8.0"
preferenceKtx = "1.2.1"
appcompat = "1.7.0"
recyclerview = "1.4.0"
material = "1.12.0"
room = "2.7.1"
securityCrypto = "1.1.0-alpha06"
